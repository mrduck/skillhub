<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- ===== 主列表页 ===== -->
    <div id="page-main" class="page active">
      <!-- 顶部导航 -->
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand-icon">◆</span>
          <span class="brand-name">SkillHub</span>
        </div>
        <button id="btn-settings" class="btn-icon" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>

      <!-- 搜索栏 -->
      <div class="search-container">
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="搜索 Skills..."
            autocomplete="off"
          >
          <button id="search-clear" class="search-clear" title="清除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 筛选行 -->
      <div class="filter-row">
        <select id="platform-filter" class="filter-select">
          <option value="all">全部平台</option>
          <option value="claude-code">Claude Code</option>
          <option value="cursor">Cursor</option>
          <option value="trae">TRAE</option>
          <option value="windsurf">Windsurf</option>
          <option value="copilot">Copilot</option>
          <option value="codex">Codex</option>
          <option value="gemini-cli">Gemini CLI</option>
        </select>
        <select id="category-filter" class="filter-select">
          <option value="all">全部分类</option>
        </select>
      </div>

      <!-- Tab 切换 -->
      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="hot">
          <span class="tab-btn-icon">★</span>
          <span>热门</span>
        </button>
        <button class="tab-btn" data-tab="new">
          <span class="tab-btn-icon">⏰</span>
          <span>最新</span>
        </button>
        <button class="tab-btn" data-tab="favorites">
          <span class="tab-btn-icon">⭐</span>
          <span>收藏</span>
        </button>
      </nav>

      <!-- Skills 列表 -->
      <div id="skills-container" class="skills-container">
        <!-- 骨架屏 -->
        <div class="skeleton-list">
          <div class="skeleton-card">
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-meta"></div>
            <div class="skeleton-line skeleton-desc"></div>
            <div class="skeleton-line skeleton-desc short"></div>
            <div class="skeleton-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-meta"></div>
            <div class="skeleton-line skeleton-desc"></div>
            <div class="skeleton-line skeleton-desc short"></div>
            <div class="skeleton-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-meta"></div>
            <div class="skeleton-line skeleton-desc"></div>
            <div class="skeleton-line skeleton-desc short"></div>
            <div class="skeleton-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 底部状态栏 -->
      <footer class="footer-bar">
        <span class="footer-source">skills.sh + GitHub</span>
        <span id="skills-count" class="footer-count"></span>
      </footer>
    </div>

    <!-- ===== 详情页 ===== -->
    <div id="page-detail" class="page">
      <header class="topbar">
        <button id="detail-back" class="btn-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="topbar-title">Skill 详情</span>
        <div class="topbar-spacer"></div>
      </header>
      <div id="detail-content" class="detail-scroll">
        <div class="detail-loading">
          <div class="skeleton-line skeleton-title"></div>
          <div class="skeleton-line skeleton-meta"></div>
          <div class="skeleton-line skeleton-desc"></div>
        </div>
      </div>
    </div>

    <!-- ===== 收藏页 ===== -->
    <div id="page-favorites" class="page">
      <header class="topbar">
        <button id="favorites-back" class="btn-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="topbar-title">我的收藏</span>
        <button id="btn-manage" class="btn-ghost btn-sm">管理</button>
      </header>
      <div id="favorites-content" class="favorites-scroll">
        <div class="empty-state">
          <div class="empty-icon">⭐</div>
          <div class="empty-title">还没有收藏任何 Skill</div>
          <div class="empty-desc">浏览热门 Skills，点击星标即可收藏</div>
        </div>
      </div>
      <div class="fav-footer">
        <button id="btn-add-group" class="btn-secondary btn-block btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新建分组
        </button>
      </div>
    </div>

    <!-- ===== 设置页 ===== -->
    <div id="page-settings" class="page">
      <header class="topbar">
        <button id="settings-back" class="btn-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="topbar-title">设置</span>
        <div class="topbar-spacer"></div>
      </header>

      <div class="settings-scroll">
        <!-- Pro 授权 -->
        <div class="settings-section">
          <div class="section-header">
            <h3>Pro 授权</h3>
          </div>
          <div class="section-body">
            <div id="license-status" class="license-status not-activated">
              正在检查授权状态...
            </div>
            <div id="license-actions" class="license-actions" style="display:none;">
              <button id="btn-upgrade-pro" class="btn-primary btn-block btn-lg">
                升级 Pro（$2.99 一次性买断）
              </button>
              <button id="btn-login-page" class="btn-ghost btn-block btn-sm" style="margin-top: 8px;">
                已有账号？登录激活
              </button>
            </div>
            <div id="license-pro-info" style="display:none;">
              <div class="pro-email" id="pro-email"></div>
              <button id="btn-manage-subscription" class="btn-secondary btn-sm" style="margin-top: 8px;">
                管理订阅
              </button>
            </div>
          </div>
        </div>

        <!-- 数据管理 -->
        <div class="settings-section">
          <div class="section-header">
            <h3>数据管理</h3>
          </div>
          <div class="section-body">
            <div class="btn-row">
              <button id="btn-refresh-data" class="btn-secondary btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10"/>
                  <polyline points="1 20 1 14 7 14"/>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                刷新数据
              </button>
              <button id="btn-export-favorites" class="btn-secondary btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                导出收藏
              </button>
            </div>
          </div>
        </div>

        <!-- 升级 Pro -->
        <div class="settings-section" id="pro-upgrade-section">
          <div class="section-header">
            <h3>升级 Pro</h3>
          </div>
          <div class="section-body">
            <ul class="pro-features">
              <li>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                无限收藏
              </li>
              <li>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                分组管理
              </li>
              <li>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                GitHub 右键一键安装
              </li>
              <li>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                跨设备同步
              </li>
              <li>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                未来所有更新
              </li>
            </ul>
            <div class="price-banner">
              <span class="price-amount">$2.99</span>
              <span class="price-label">一次性买断</span>
            </div>
            <button id="btn-buy-pro" class="btn-primary btn-block">前往购买</button>
          </div>
        </div>

        <!-- 关于 -->
        <div class="settings-section about-section">
          <div class="about-brand">
            <span class="brand-icon">◆</span>
            <span class="brand-name">SkillHub</span>
          </div>
          <p class="about-version">v1.0.1</p>
          <p class="about-desc">帮助 AI 编程用户发现、管理 Skills</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Pro 升级弹窗（在 #app 外部，避免 CSS 层叠干扰） ===== -->
  <div id="pro-modal" class="modal-overlay">
    <div class="modal-card" style="background:#fff;color:#1E1B4B;border:1px solid #E4E2F0;border-radius:16px;padding:24px;width:320px;max-width:90%;text-align:center;box-shadow:0 16px 48px rgba(30,27,75,0.16);">
      <div class="modal-icon">⭐</div>
      <h3 class="modal-title">免费版收藏已达上限</h3>
      <p class="modal-desc">免费版最多收藏 <strong>10 个</strong> Skill，升级 Pro 解锁无限收藏 + 更多功能</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary flex-1">稍后再说</button>
        <button id="modal-upgrade" class="btn-primary flex-1">升级 Pro</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast 通知 ===== -->
  <div id="toast" class="toast">
    <span class="toast-icon"></span>
    <span class="toast-message"></span>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
