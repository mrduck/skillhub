<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  
  <!-- Neural network "S" shape made of connected nodes -->
  <!-- Top horizontal bar -->
  <circle cx="48" cy="34" r="8" fill="white" opacity="0.95"/>
  <rect x="54" y="31" width="20" height="6" rx="3" fill="white" opacity="0.9"/>
  <circle cx="80" cy="34" r="8" fill="white" opacity="0.95"/>
  
  <!-- Top-right vertical -->
  <rect x="77" y="40" width="6" height="16" rx="3" fill="white" opacity="0.9"/>
  <circle cx="80" cy="62" r="8" fill="white" opacity="0.95"/>
  
  <!-- Middle horizontal -->
  <rect x="56" y="59" width="16" height="6" rx="3" fill="white" opacity="0.85"/>
  <circle cx="48" cy="62" r="7" fill="white" opacity="0.9"/>
  
  <!-- Bottom-left vertical -->
  <rect x="45" y="67" width="6" height="16" rx="3" fill="white" opacity="0.9"/>
  <circle cx="48" cy="90" r="8" fill="white" opacity="0.95"/>
  
  <!-- Bottom horizontal -->
  <rect x="54" y="87" width="20" height="6" rx="3" fill="white" opacity="0.9"/>
  <circle cx="80" cy="90" r="8" fill="white" opacity="0.95"/>
  
  <!-- Small accent dots -->
  <circle cx="70" cy="48" r="2" fill="white" opacity="0.5"/>
  <circle cx="62" cy="76" r="2" fill="white" opacity="0.5"/>
  <circle cx="88" cy="50" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="38" cy="78" r="1.5" fill="white" opacity="0.3"/>
</svg>